<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" width="520" height="120" role="img" aria-label="Péptidos Mayoreo">
  <title>Péptidos Mayoreo</title>
  <desc>Logo of Péptidos Mayoreo - wordmark with chevron mark</desc>

  <!-- Chevron mark -->
  <rect x="10" y="20" width="80" height="80" rx="16" fill="#0A2540"/>
  <path d="M33 40 L53 60 L33 80" stroke="#00D4FF" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M53 40 L73 60 L53 80" stroke="#FFFFFF" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Wordmark -->
  <text x="108" y="68" font-family="Inter, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="36" font-weight="500" fill="#0A2540" letter-spacing="-0.8">péptidos<tspan fill="#00D4FF" font-weight="400">»</tspan>mayoreo</text>

  <!-- Tagline -->
  <text x="108" y="92" font-family="Inter, system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="500" fill="#6B7280" letter-spacing="2">DIRECTO DE FÁBRICA · MÉXICO</text>
</svg>
